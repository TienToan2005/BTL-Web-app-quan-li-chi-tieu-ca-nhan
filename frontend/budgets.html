<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngân sách - $pendee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .text-spendee { color: #1FC06A; }
        .btn-spendee { background-color: #1FC06A; border: none; color: white; transition: 0.3s; }
        .btn-spendee:hover { background-color: #19a359; color: white; transform: translateY(-2px); }
        .custom-card { border-radius: 20px; border: none; transition: transform 0.2s; }
        .custom-card:hover { transform: translateY(-5px); }
        .nav-link.active { color: #1FC06A !important; border-bottom: 3px solid #1FC06A; }
        .progress { background-color: #e9ecef; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 text-dark" href="dashboard.html">
                <i class="fa-solid fa-chart-pie text-spendee"></i> $pendee
            </a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">
                    <li class="nav-item mx-3"><a class="nav-link text-secondary fw-medium" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item mx-3"><a class="nav-link active fw-bold" href="budgets.html">Budgets</a></li>
                    <li class="nav-item mx-3"><a class="nav-link text-secondary fw-medium" href="transactions.html">Transactions</a></li>
                </ul>
            </div>
            
            <div class="dropdown" id="user-profile-nav">
                <div class="d-flex align-items-center cursor-pointer" id="userMenu" data-bs-toggle="dropdown" style="cursor: pointer;">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar" class="rounded-circle me-2" width="35">
                    <span id="userDisplay" class="text-secondary fw-bold">Toàn</span>
                    <i class="fa-solid fa-chevron-down ms-2 text-secondary" style="font-size: 0.7rem;"></i>
                </div>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                    <li><a class="dropdown-item py-2 fw-medium" href="settings.html"><i class="fa-solid fa-gear me-2"></i> Cài đặt</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item py-2 text-danger fw-bold" href="#" onclick="Auth.logout()"><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 1000px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold text-dark mb-1">Ngân sách chi tiêu</h4>
                <p class="text-secondary mb-0" id="currentMonthYear">Tháng 3, 2026</p>
            </div>
            <button class="btn btn-spendee shadow-sm px-4 py-2 fw-bold" onclick="BudgetManager.openAddModal()">
                <i class="fa-solid fa-plus me-1"></i> Add New Budget
            </button>
        </div>

        <div class="card custom-card shadow-sm p-4 mb-5 bg-white">
            <h6 class="fw-bold mb-4 text-dark"><i class="fa-solid fa-chart-column text-spendee me-2"></i> Phân tích so sánh Hạn mức & Thực tế</h6>
            <div style="height: 350px; position: relative;">
                <canvas id="budgetChart"></canvas>
            </div>
        </div>

        <div id="budget-list" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-success" role="status"></div>
                <p class="mt-2 text-secondary small">Đang lấy dữ liệu chi tiêu...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addBudgetModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 25px;">
                <div class="modal-header border-0 pb-0 pt-4 px-4">
                    <h5 class="fw-bold m-0">Thiết lập ngân sách mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addBudgetForm">
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted uppercase">HẠN MỨC CHI TIÊU (VNĐ)</label>
                            <input type="number" id="budgetAmount" class="form-control form-control-lg border-2" placeholder="VD: 2000000" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted uppercase">DANH MỤC ÁP DỤNG</label>
                            <select id="budgetCategory" class="form-select form-select-lg border-2" required>
                                </select>
                        </div>
                        <button type="submit" class="btn btn-spendee w-100 fw-bold py-3 fs-5 shadow">LƯU THIẾT LẬP</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/budgets.js"></script>
</body>
</html>
