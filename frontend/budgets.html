<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngân sách - $pendee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 text-dark" href="dashboard.html">
                <i class="fa-solid fa-chart-pie text-spendee"></i> $pendee
            </a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">
                    <li class="nav-item mx-3">
                        <a class="nav-link text-secondary" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item mx-3">
                        <a class="nav-link active fw-bold text-spendee border-bottom border-success border-3 pb-3" href="#">Budgets</a>
                    </li>
                </ul>
            </div>
            <div class="d-flex align-items-center">
                <img src="https://ui-avatars.com/api/?name=Quan+Truong&background=random" alt="Avatar" class="rounded-circle me-2" width="35">
                <span class="text-secondary fw-medium">quantruong998@gmail.com</span>
                <i class="fa-solid fa-chevron-down ms-2 text-secondary fs-7"></i>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 800px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold text-dark">Ngân sách tháng 3/2026</h4>
            <button class="btn text-white fw-bold shadow-sm" style="background-color: #1FC06A;">
                <i class="fa-solid fa-plus me-1"></i> Add New Budget
            </button>
        </div>

        <div class="card border-0 shadow-sm custom-card mb-3">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center">
                        <div class="bg-warning text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 45px; height: 45px;">
                            <i class="fa-solid fa-utensils fs-5"></i>
                        </div>
                        <div>
                            <h5 class="mb-0 fw-bold text-dark">Ăn uống</h5>
                            <small class="text-secondary">Còn lại: 1.500.000 đ</small>
                        </div>
                    </div>
                    <div class="text-end">
                        <h5 class="mb-0 fw-bold text-dark">3.500.000 đ</h5>
                        <small class="text-secondary">/ 5.000.000 đ</small>
                    </div>
                </div>
                <div class="progress mt-3" style="height: 10px; border-radius: 10px;">
                    <div class="progress-bar bg-warning" role="progressbar" style="width: 70%;" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm custom-card mb-3">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center">
                        <div class="bg-info text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 45px; height: 45px;">
                            <i class="fa-solid fa-car fs-5"></i>
                        </div>
                        <div>
                            <h5 class="mb-0 fw-bold text-dark">Đi lại & Xăng xe</h5>
                            <small class="text-danger">Đã vượt mức: 100.000 đ</small>
                        </div>
                    </div>
                    <div class="text-end">
                        <h5 class="mb-0 fw-bold text-danger">1.100.000 đ</h5>
                        <small class="text-secondary">/ 1.000.000 đ</small>
                    </div>
                </div>
                <div class="progress mt-3" style="height: 10px; border-radius: 10px;">
                    <div class="progress-bar bg-danger" role="progressbar" style="width: 100%;" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
