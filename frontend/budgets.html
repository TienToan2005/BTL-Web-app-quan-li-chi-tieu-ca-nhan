<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngân sách - Persional Budget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <a href="dashboard.html" class="logo">Persional Budget</a>
        <div class="menu">
            <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="budgets.html" class="menu-item active"><i class="fa-solid fa-chart-pie"></i> Budgets</a>
            <a href="transactions.html" class="menu-item"><i class="fa-solid fa-money-bill-transfer"></i> Transactions</a>
            <a href="settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
        
        <div class="sidebar-user dropdown cursor-pointer" data-bs-toggle="dropdown">
            <div class="d-flex align-items-center">
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=random" class="rounded-circle me-3" width="40">
                <div>
                    <span id="userDisplay" class="fw-bold d-block text-white">User</span>
                    <small class="text-white-50">View Profile</small>
                </div>
            </div>
            <ul class="dropdown-menu dropdown-menu-dark shadow border-0 mt-2 w-100" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
                <li><a class="dropdown-item py-2 text-danger fw-bold" href="#" onclick="Auth.logout()"><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a></li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold m-0">Ngân sách chi tiêu</h3>
                <div class="d-flex align-items-center px-3 py-2 rounded-pill border mt-2" style="background: rgba(255,255,255,0.05);">
                    <i class="fa-solid fa-angle-left cursor-pointer px-2" onclick="BudgetManager.changeMonth(-1)"></i>
                    <span id="calendarText" class="fw-bold mx-2 text-white" style="min-width: 120px; text-align: center;">Tháng 3, 2026</span>
                    <i class="fa-regular fa-calendar-check text-info mx-1"></i>
                    <i class="fa-solid fa-angle-right cursor-pointer px-2" onclick="BudgetManager.changeMonth(1)"></i>
                </div>
            </div>
            <button class="btn btn-primary shadow-sm px-4 py-2 fw-bold rounded-pill" onclick="BudgetManager.openAddModal()">
                <i class="fa-solid fa-plus me-1"></i> Thêm giao dịch
            </button>
        </div>

        <div class="card custom-card p-4 mb-5">
            <h6 class="fw-bold mb-4 uppercase"><i class="fa-solid fa-chart-column text-info me-2"></i> Phân tích so sánh Hạn mức & Thực tế</h6>
            <div style="height: 350px; position: relative;">
                <canvas id="budgetChart"></canvas>
            </div>
        </div>

        <div id="budget-list" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-info" role="status"></div>
                <p class="mt-2 text-white-50 small">Đang lấy dữ liệu chi tiêu...</p>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addBudgetModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0 pt-4 px-4">
                <h5 class="fw-bold m-0">Thiết lập ngân sách mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="addBudgetForm">
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-white-50 uppercase">HẠN MỨC CHI TIÊU (VNĐ)</label>
                        <input type="text" id="budgetAmount" class="form-control form-control-lg border-2 text-info fw-bold fs-4 text-center" placeholder="VD: 2000000" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-white-50 uppercase">DANH MỤC ÁP DỤNG</label>
                        <select id="budgetCategory" class="form-select form-select-lg border-2" required>
                            </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3 fs-5 shadow rounded-3">LƯU THIẾT LẬP</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/budgets.js"></script>
</body>
</html>
