<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt - Personal Budgeting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .text-spendee { color: #1FC06A; }
        .bg-spendee { background-color: #1FC06A; }
        .card { border-radius: 15px; border: none; }
        
        /* Style cho vòng tròn Icon */
        .icon-circle {
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
        }

        /* Sidebar active style */
        .list-group-item.active {
            background-color: #1FC06A !important;
            border-color: #1FC06A !important;
            font-weight: 600;
        }
        
        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3 mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 text-dark" href="dashboard.html">
                <i class="fa-solid fa-chart-pie text-spendee"></i> Personal Budgeting
            </a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">
                    <li class="nav-item mx-2"><a class="nav-link text-secondary" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item mx-2"><a class="nav-link text-secondary" href="budgets.html">Budgets</a></li>
                    <li class="nav-item mx-2"><a class="nav-link text-secondary" href="transactions.html">Transactions</a></li>
                </ul>
            </div>
            <div class="dropdown">
                <div class="d-flex align-items-center cursor-pointer" data-bs-toggle="dropdown">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=random" class="rounded-circle me-2" width="35">
                    <span id="userDisplay" class="fw-bold text-secondary text-capitalize">User</span>
                    <i class="fa-solid fa-chevron-down ms-2 small text-secondary"></i>
                </div>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                    <li><a class="dropdown-item py-2 text-danger fw-bold" href="#" onclick="Auth.logout()"><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group shadow-sm border-0 mb-4" id="settings-sidebar">
                    <a href="javascript:void(0)" onclick="SettingsManager.switchTab('category', this)" class="list-group-item list-group-item-action active py-3">
                        <i class="fa-solid fa-tags me-2"></i> Cài đặt danh mục
                    </a>
                    <a href="javascript:void(0)" onclick="SettingsManager.switchTab('wallet', this)" class="list-group-item list-group-item-action py-3">
                        <i class="fa-solid fa-wallet me-2"></i> Cài đặt Ví
                    </a>
                </div>
            </div>

            <div class="col-md-9">
                
                <div id="section-category">
                    <div class="card shadow-sm p-4 mb-4">
                        <h5 class="fw-bold mb-4">Tạo một danh mục mới</h5>
                        <form id="addCategoryForm">
                            <div class="row g-3 align-items-end">
                                <div class="col-md-2">
                                    <label class="small fw-bold text-secondary mb-2">Biểu tượng</label>
                                    <select id="catIcon" class="form-select">
                                        <option value="fa-utensils">🍴 Thức ăn</option>
                                        <option value="fa-cart-shopping">🛒 Mua sắm</option>
                                        <option value="fa-car">🚗 Đi lại</option>
                                        <option value="fa-money-bill">💵 Tiền lương</option>
                                        <option value="fa-gamepad">🎮 Giải trí</option>
                                        <option value="fa-house">🏠 Nhà cửa</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <label class="small fw-bold text-secondary mb-2">Màu sắc</label>
                                    <input type="color" id="catColor" class="form-control form-control-color w-100" value="#1FC06A">
                                </div>
                                <div class="col-md-4">
                                    <label class="small fw-bold text-secondary mb-2">Tên danh mục</label>
                                    <input type="text" id="catName" class="form-control" placeholder="Ví dụ: Tiền ăn phở..." required>
                                </div>
                                <div class="col-md-2">
                                    <label class="small fw-bold text-secondary mb-2">Loại</label>
                                    <select id="catType" class="form-select">
                                        <option value="EXPENSE">Chi phí</option>
                                        <option value="INCOME">Thu nhập</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-success bg-spendee w-100 fw-bold border-0">Thêm</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="card shadow-sm p-4">
                        <h6 class="fw-bold text-secondary mb-4">Danh mục hiện tại</h6>
                        <div id="categoryList">
                            </div>
                    </div>
                </div>

                <div id="section-wallet" class="d-none">
                    <div class="card shadow-sm p-4 mb-4">
                        <h5 class="fw-bold mb-4">Thêm ví mới</h5>
                        <form id="addWalletForm">
                            <div class="row g-3 align-items-end">
                                <div class="col-md-5">
                                    <label class="small fw-bold text-secondary mb-2">Tên ví</label>
                                    <input type="text" id="wName" class="form-control" placeholder="Ví dụ: Ví MoMo, Techcombank..." required>
                                </div>
                                <div class="col-md-5">
                                    <label class="small fw-bold text-secondary mb-2">Số dư khởi tạo</label>
                                    <input type="number" id="wBalance" class="form-control" placeholder="0" required>
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-primary w-100 fw-bold border-0">Thêm ví</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="card shadow-sm p-4">
                        <h6 class="fw-bold text-secondary mb-4">Ví của tôi</h6>
                        <div id="walletList">
                            </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
