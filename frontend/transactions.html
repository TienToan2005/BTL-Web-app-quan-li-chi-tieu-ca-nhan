<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao dịch - Persional Budget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <a href="dashboard.html" class="logo">Persional Budget </a>
        <div class="menu">
            <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="budgets.html" class="menu-item"><i class="fa-solid fa-chart-pie"></i> Budgets</a>
            <a href="transactions.html" class="menu-item active"><i class="fa-solid fa-money-bill-transfer"></i> Transactions</a>
            <a href="settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
        <div class="sidebar-user dropdown cursor-pointer" data-bs-toggle="dropdown">
            <div class="d-flex align-items-center">
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=random" class="rounded-circle me-3" width="40">
                <div>
                    <span id="userDisplay" class="fw-bold d-block text-white">User</span>
                    <small class="text-white-50">View Profile</small>
                </div>
            </div>
            <ul class="dropdown-menu dropdown-menu-dark shadow border-0 mt-2 w-100" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
                <li><a class="dropdown-item py-2 text-danger fw-bold" href="#" onclick="Auth.logout()"><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a></li>
            </ul>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0">Lịch sử giao dịch</h3>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-primary fw-bold" onclick="TransactionManager.openTransferModal()">
                    <i class="fa-solid fa-right-left me-2"></i> Chuyển tiền
                </button>
                <button class="btn btn-primary fw-bold" onclick="TransactionManager.openAddModal()">
                    <i class="fa-solid fa-plus me-2"></i> Thêm GD
                </button>
                <div class="dropdown">
                    <button class="btn btn-outline-secondary fw-bold" data-bs-toggle="dropdown">
                        <i class="fa-solid fa-file-export me-2"></i> Xuất
                    </button>
                    <ul class="dropdown-menu dropdown-menu-dark">
                        <li><a class="dropdown-item" href="#" onclick="TransactionManager.handleExport('excel')">Xuất Excel</a></li>
                        <li><a class="dropdown-item" href="#" onclick="TransactionManager.handleExport('pdf')">Xuất PDF</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="card custom-card p-4 mb-4">
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="small fw-bold mb-1">Từ ngày</label>
                    <input type="date" id="startDate" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="small fw-bold mb-1">Đến ngày</label>
                    <input type="date" id="endDate" class="form-control">
                </div>
            </div>
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" id="searchNote" class="form-control" placeholder="Tìm ghi chú...">
                </div>
                <div class="col-md-3">
                    <select id="filterWallet" class="form-select"><option value="">Tất cả ví</option></select>
                </div>
                <div class="col-md-3">
                    <select id="filterCategory" class="form-select"><option value="">Tất cả danh mục</option></select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button class="btn btn-primary flex-grow-1" onclick="TransactionManager.loadTransactions()"><i class="fa-solid fa-filter"></i></button>
                    <button class="btn btn-outline-secondary" onclick="TransactionManager.resetFilters()"><i class="fa-solid fa-rotate-left"></i></button>
                </div>
            </div>
        </div>

        <div class="card custom-card overflow-hidden">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr class="small fw-bold">
                            <th class="ps-4 py-3">NGÀY</th>
                            <th>DANH MỤC</th>
                            <th>VÍ</th>
                            <th>GHI CHÚ</th>
                            <th class="text-end">SỐ TIỀN</th>
                            <th class="text-center pe-4">THAO TÁC</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-list"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Thêm Giao Dịch -->
<div class="modal fade" id="addTransactionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0">
            <div class="modal-header border-0 pb-0 pt-4 px-4">
                <h5 class="fw-bold m-0">Thêm Giao Dịch</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="addTransactionForm">
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-center d-block">SỐ TIỀN (VNĐ)</label>
                        <input type="text" id="tAmount" class="form-control text-center fs-3 fw-bold text-info border-0" placeholder="0" required>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label small fw-bold">CHỌN VÍ</label>
                            <select id="tWallet" class="form-select" required></select>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold">DANH MỤC</label>
                            <select id="tCategory" class="form-select" required></select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">GHI CHÚ</label>
                        <textarea id="tNote" class="form-control" rows="2" placeholder="Hôm nay mua gì thế?"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold"><i class="fa-solid fa-paperclip"></i> ĐÍNH KÈM HÓA ĐƠN</label>
                        <input type="file" id="tReceipt" accept="image/*" class="form-control form-control-sm">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3 mt-2">LƯU GIAO DỊCH</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Modal Chuyển Tiền -->
<div class="modal fade" id="transferModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0">
            <div class="modal-header border-0 pt-4 px-4">
                <h5 class="fw-bold m-0"><i class="fa-solid fa-money-bill-transfer me-2"></i>Chuyển tiền</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="transferForm">
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-center d-block">SỐ TIỀN CHUYỂN</label>
                        <input type="text" id="transferAmount" class="form-control text-center fs-3 fw-bold text-info border-0" placeholder="0" required>
                    </div>
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label class="form-label small fw-bold">TỪ VÍ</label>
                            <select id="fromWallet" class="form-select" required></select>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold">SANG VÍ</label>
                            <select id="toWallet" class="form-select" required></select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3">XÁC NHẬN CHUYỂN</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="receiptModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content rounded-4 border-0 bg-dark text-white">
            <div class="modal-header border-0 pb-0 pt-3 px-3">
                <h5 class="fw-bold m-0"><i class="fa-solid fa-image me-2"></i>Hóa đơn đính kèm</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" onclick="TransactionManager.closeReceipt()"></button>
            </div>
            <div class="modal-body p-3 text-center">
                <img id="receiptImage" src="" alt="Hóa đơn" class="img-fluid rounded" style="max-height: 75vh; object-fit: contain;">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/transactions.js"></script>
</body>
</html>
