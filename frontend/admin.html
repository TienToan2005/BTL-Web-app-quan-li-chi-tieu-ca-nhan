<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Spendee | Quản trị Hệ thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-blue-800 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-xl font-bold"><i class="fa-solid fa-shield-halved mr-2"></i>Spendee Admin Panel</div>
            <div>
                <span id="admin-name" class="mr-4 font-semibold">Đang tải...</span>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-1 rounded shadow text-sm font-bold">
                    <i class="fa-solid fa-right-from-bracket mr-1"></i> Đăng xuất
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Tổng quan hệ thống</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500 flex justify-between items-center">
                <div>
                    <h3 class="text-gray-500 font-bold uppercase text-xs mb-1">Người Dùng</h3>
                    <p id="total-users" class="text-3xl font-bold text-gray-800">0</p>
                </div>
                <i class="fa-solid fa-users text-4xl text-gray-200"></i>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500 flex justify-between items-center">
                <div>
                    <h3 class="text-gray-500 font-bold uppercase text-xs mb-1">Tổng Số Ví</h3>
                    <p id="total-wallets" class="text-3xl font-bold text-gray-800">0</p>
                </div>
                <i class="fa-solid fa-wallet text-4xl text-gray-200"></i>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-purple-500 flex justify-between items-center">
                <div>
                    <h3 class="text-gray-500 font-bold uppercase text-xs mb-1">Tổng Giao Dịch</h3>
                    <p id="total-tx" class="text-3xl font-bold text-gray-800">0</p>
                </div>
                <i class="fa-solid fa-money-bill-transfer text-4xl text-gray-200"></i>
            </div>
        </div>

        <h2 class="text-2xl font-bold mb-4 text-gray-800">Danh sách Tài khoản</h2>
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full text-left border-collapse">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="px-6 py-3 font-bold text-sm">ID</th>
                        <th class="px-6 py-3 font-bold text-sm">Tài khoản</th>
                        <th class="px-6 py-3 font-bold text-sm">Email</th>
                        <th class="px-6 py-3 font-bold text-sm text-center">Vai trò</th>
                        <th class="px-6 py-3 font-bold text-sm text-center">Trạng thái</th>
                        <th class="px-6 py-3 font-bold text-sm text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody id="user-table-body" class="divide-y divide-gray-200">
                    <tr><td colspan="6" class="px-6 py-4 text-center">Đang tải...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/api/admin";
        
        // 1. Lấy Token & Kiểm tra đăng nhập
        const token = localStorage.getItem("access_token");
        const username = localStorage.getItem("username") || "Sếp";
        document.getElementById("admin-name").innerText = `Xin chào, ${username}`;

        if (!token) {
            alert("Bạn chưa đăng nhập!");
            window.location.href = "login.html";
        }

        // Cấu hình Header có chứa Token để qua mặt "Vệ sĩ"
        const fetchOptions = {
            headers: { "Authorization": `Bearer ${token}` }
        };

        // Xử lý lỗi 401, 403
        function handleApiError(res) {
            if (res.status === 401 || res.status === 403) {
                alert("Bạn không có quyền Admin hoặc phiên đã hết hạn!");
                logout();
                throw new Error("Unauthorized");
            }
        }

        // 2. Load Thống kê
        async function loadStats() {
            const res = await fetch(`${API_URL}/stats`, fetchOptions);
            handleApiError(res);
            const result = await res.json();
            if (result.status === "success") {
                document.getElementById('total-users').innerText = result.data.total_users;
                document.getElementById('total-wallets').innerText = result.data.total_wallets;
                document.getElementById('total-tx').innerText = result.data.total_tx;
            }
        }

        // 3. Load Danh sách User
        async function loadUsers() {
            const res = await fetch(`${API_URL}/users`, fetchOptions);
            handleApiError(res);
            const result = await res.json();
            
            if (result.status === "success") {
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = ""; 

                result.data.forEach(user => {
                    const roleBadge = user.role === 'ADMIN' 
                        ? `<span class="bg-purple-100 text-purple-800 px-2 py-1 rounded text-xs font-bold">ADMIN</span>`
                        : `<span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-bold">USER</span>`;
                    
                    const statusBadge = user.status === 'ACTIVE'
                        ? `<span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-bold"><i class="fa-solid fa-check mr-1"></i>Hoạt động</span>`
                        : `<span class="bg-red-100 text-red-800 px-2 py-1 rounded text-xs font-bold"><i class="fa-solid fa-lock mr-1"></i>Bị khóa</span>`;

                    // Nút Hành động sẽ đổi màu và chữ tùy theo trạng thái bị khóa hay không
                    const actionBtn = user.role === 'ADMIN' ? `<span class="text-gray-400 text-xs">Vô hiệu</span>` : 
                        `<button onclick="toggleBan(${user.id})" class="px-3 py-1 rounded font-bold text-white text-xs shadow transition ${user.status === 'ACTIVE' ? 'bg-red-500 hover:bg-red-600' : 'bg-green-500 hover:bg-green-600'}">
                            ${user.status === 'ACTIVE' ? 'Khóa TK' : 'Mở Khóa'}
                        </button>`;

                    const row = `
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 text-gray-500">#${user.id}</td>
                            <td class="px-6 py-4 font-semibold text-gray-800">${user.username}</td>
                            <td class="px-6 py-4 text-gray-600">${user.email}</td>
                            <td class="px-6 py-4 text-center">${roleBadge}</td>
                            <td class="px-6 py-4 text-center">${statusBadge}</td>
                            <td class="px-6 py-4 text-center">${actionBtn}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            }
        }

        // 4. Hàm Khóa/Mở Khóa User
        async function toggleBan(userId) {
            if (!confirm(`Bạn có chắc chắn muốn thay đổi trạng thái của tài khoản #${userId}?`)) return;
            
            const res = await fetch(`${API_URL}/users/${userId}/toggle-ban`, {
                method: "PUT",
                headers: fetchOptions.headers
            });
            handleApiError(res);
            const result = await res.json();
            
            if (result.status === "success") {
                alert(result.message);
                loadUsers(); // Load lại bảng để cập nhật màu
            } else {
                alert("Lỗi: " + result.detail);
            }
        }

        // 5. Đăng xuất
        function logout() {
            localStorage.removeItem("access_token");
            localStorage.removeItem("username");
            window.location.href = "login.html"; // Trả về trang đăng nhập của ông
        }

        // Chạy khi mở trang
        window.onload = () => {
            loadStats();
            loadUsers();
        };
    </script>
</body>
</html>
