<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - $pendee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card border-0 shadow-sm p-4 custom-card" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold fs-2"><i class="fa-solid fa-chart-pie text-spendee"></i> $pendee</h2>
            <p class="text-secondary mt-2">Đăng nhập để bắt đầu quản lý</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-medium text-dark">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-medium text-dark">Mật khẩu</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" id="btnLogin" class="btn w-100 text-white fw-bold py-2 mb-3" style="background-color: #1FC06A;">
                <span id="loginText">Đăng nhập</span>
                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none"></span>
            </button>
            
            <div class="text-center text-secondary">
                Chưa có tài khoản? <a href="#" class="text-spendee text-decoration-none fw-bold">Đăng ký ngay</a>
            </div>
        </form>
    </div>

    <script src="api.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const text = document.getElementById('loginText');
            const spinner = document.getElementById('loginSpinner');

            btn.disabled = true;
            text.innerText = "Đang kiểm tra...";
            spinner.classList.remove('d-none');

            try {
                const result = await API.login(userVal, passVal);

                if (result.success) {
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Lỗi: ' + (result.message || 'Sai tài khoản hoặc mật khẩu'));
                }
            } catch (error) {
                console.error(error);
                alert('Không thể kết nối đến Server Backend!');
            } finally {
                btn.disabled = false;
                text.innerText = "Đăng nhập";
                spinner.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
