<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Persional Budget</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0a1f44, #0072ff); /* Khớp màu nền Fintech */
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08); /* Hiệu ứng kính mờ (Glassmorphism) */
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 40px 30px;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title-icon {
            font-size: 36px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-label {
            font-weight: 300;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            border-radius: 10px;
            padding: 12px 15px;
            transition: 0.3s;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.3);
        }

        /* Xử lý riêng cho ô password có icon con mắt */
        .input-group > .form-control {
            border-radius: 10px 0 0 10px;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 0 10px 10px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .input-group-text:hover {
            color: #00c6ff;
        }

        .btn-login {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 10px;
            transition: 0.3s;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 198, 255, 0.4);
            color: #fff;
        }

        .link-register {
            color: #00c6ff;
            text-decoration: none;
            font-weight: 600;
        }

        .link-register:hover {
            text-decoration: underline;
            color: #fff;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

<div class="login-card">
    <div class="text-center mb-4">
        <i class="fa-solid fa-wallet title-icon"></i> <h3 class="fw-bold mt-2">Persional Budget</h3>
        <p class="subtitle">Đăng nhập để tiếp tục</p>
    </div>

    <form id="loginForm">
        <div id="login-error-msg" class="text-danger small fw-bold mb-3 text-center d-none"></div>

        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input type="text" id="username" class="form-control" placeholder="Nhập username" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group">
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                <span class="input-group-text" onclick="togglePassword()">
                    <i id="eyeIcon" class="fa-solid fa-eye"></i>
                </span>
            </div>
        </div>

        <button type="submit" id="btnLogin" class="btn btn-login w-100 text-white py-2 mb-4">
            <span id="loginText">Đăng nhập</span>
            <span id="loginSpinner" class="spinner-border spinner-border-sm d-none"></span>
        </button>

        <div class="text-center">
            <span class="subtitle">Chưa có tài khoản?</span>
            <a href="register.html" class="link-register">Đăng ký ngay</a>
        </div>
    </form>
</div>

<script>
    function togglePassword() {
        const password = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");

        if (password.type === "password") {
            password.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            password.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }
</script>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script> 
<script src="js/login.js"></script>

</body>
</html>
