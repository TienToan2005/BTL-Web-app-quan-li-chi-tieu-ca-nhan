<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Personal Budgeting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card border-0 shadow-sm p-4 custom-card" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold fs-2"><i class="fa-solid fa-user-plus text-spendee"></i> Personal Budgeting</h2>
            <p class="text-secondary mt-2">Tạo tài khoản mới</p>
        </div>
        
        <form id="registerForm">
            <div id="register-feedback" class="small fw-bold mb-3 text-center d-none"></div>
            <div class="mb-3">
                <label class="form-label fw-medium text-dark">Tên đăng nhập</label>
                <input type="text" id="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-medium text-dark">Email</label>
                <input type="email" id="email" class="form-control" placeholder="example@gmail.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-medium text-dark">Mật khẩu</label>
                <input type="password" id="password" class="form-control" placeholder="" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-medium text-dark">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="" required>
            </div>
            
            <button type="submit" id="btnRegister" class="btn w-100 text-white fw-bold py-2 mb-3" style="background-color: #1FC06A;">
                <span id="registerText">Đăng ký</span>
                <span id="registerSpinner" class="spinner-border spinner-border-sm d-none"></span>
            </button>
            
            <div class="text-center text-secondary">
                Đã có tài khoản? <a href="login.html" class="text-spendee text-decoration-none fw-bold">Đăng nhập</a>
            </div>
        </form>
    </div>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
