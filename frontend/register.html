<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Persional Budget</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0a1f44, #0072ff);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 30px;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title-icon {
            font-size: 32px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-label {
            font-weight: 300;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            border-radius: 10px;
            padding: 10px 15px;
            transition: 0.3s;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.3);
        }

        .btn-register {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 10px;
            transition: 0.3s;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 198, 255, 0.4);
            color: #fff;
        }

        .link-login {
            color: #00c6ff;
            text-decoration: none;
            font-weight: 600;
        }

        .link-login:hover {
            text-decoration: underline;
            color: #fff;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

<div class="register-card">
    <div class="text-center mb-3">
        <i class="fa-solid fa-wallet title-icon"></i>
        <h3 class="fw-bold mt-2">Persional Budget</h3>
        <p class="subtitle">Tạo tài khoản mới</p>
    </div>

    <form id="registerForm">
        <div id="register-feedback" class="small fw-bold mb-2 text-center d-none"></div>

        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input type="text" id="username" class="form-control" placeholder="Nhập username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="example@gmail.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" id="btnRegister" class="btn btn-register w-100 text-white py-2 mb-3">
            <span id="registerText">Đăng ký</span>
            <span id="registerSpinner" class="spinner-border spinner-border-sm d-none"></span>
        </button>

        <div class="text-center">
            <span class="subtitle">Đã có tài khoản?</span>
            <a href="login.html" class="link-login">Đăng nhập</a>
        </div>
    </form>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/register.js"></script>

</body>
</html>
