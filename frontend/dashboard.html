<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Quản lý chi tiêu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 text-dark" href="#">
                <i class="fa-solid fa-chart-pie text-spendee"></i> $pendee
            </a>
            
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">
                    <li class="nav-item mx-3">
                        <a class="nav-link active fw-bold text-spendee border-bottom border-success border-3 pb-3" href="#">Dashboard</a>
                    </li>
                    <li class="nav-item mx-3">
                        <a class="nav-link text-secondary" href="budgets.html">Budgets</a>
                    </li>
                </ul>
            </div>

            <div class="d-flex align-items-center">
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar" class="rounded-circle me-2" width="35">
                <span id="userDisplay" class="text-secondary fw-medium">Loading...</span>
                <i class="fa-solid fa-chevron-down ms-2 text-secondary fs-7"></i>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h4 class="fw-bold text-dark mb-4">Overview</h4>
        
        <div class="d-flex justify-content-end mb-3">
            <div class="bg-white px-3 py-2 rounded shadow-sm border text-secondary">
                <i class="fa-solid fa-angle-left me-3 cursor-pointer"></i>
                <span id="currentMonthYear">March 2026</span> <i class="fa-regular fa-calendar ms-2"></i>
                <i class="fa-solid fa-angle-right ms-3 cursor-pointer"></i>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm custom-card">
                    <div class="card-body">
                        <p class="text-secondary mb-1 fw-medium">Total Balance</p>
                        <h3 id="totalBalance" class="text-spendee fw-normal">0 đ</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm custom-card">
                    <div class="card-body">
                        <p class="text-secondary mb-1 fw-medium">Period Change</p>
                        <h3 id="periodChange" class="text-spendee fw-normal">0 đ</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm custom-card">
                    <div class="card-body">
                        <p class="text-secondary mb-1 fw-medium">Period Expenses</p>
                        <h3 id="periodExpenses" class="text-danger fw-normal">0 đ</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm custom-card">
                    <div class="card-body">
                        <p class="text-secondary mb-1 fw-medium">Period Income</p>
                        <h3 id="periodIncome" class="text-success fw-normal">0 đ</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // Hàm định dạng tiền VNĐ cho đẹp
        const formatMoney = (amount) => {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        };

        async function initDashboard() {
            const userId = 1; // Trong thực tế sẽ lấy từ JWT token payload
            const month = 3;
            const year = 2026;

            try {
                const wallets = await API.getWallets(userId);
                if (wallets && wallets.length > 0) {
                    document.getElementById('totalBalance').innerText = formatMoney(wallets[0].balance);
                    // Cập nhật tên hiển thị (giả định)
                    document.getElementById('userDisplay').innerText = "Toàn " + userId;
                }

                const report = await API.getMonthlyReport(userId, month, year);
                if (report) {
                    const income = report.total_income || 0;
                    const expense = report.total_expense || 0;
                    
                    document.getElementById('periodIncome').innerText = formatMoney(income);
                    document.getElementById('periodExpenses').innerText = formatMoney(expense);
                    document.getElementById('periodChange').innerText = formatMoney(income - expense);
                }

            } catch (error) {
                console.error("Dashboard Error:", error);
            }
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
